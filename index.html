<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休刑警諮詢室</title>
    <style>
        body { background: #0A1E3D; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        input, textarea, select { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #C5A059; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>⚖️ 退休刑警諮詢室</h1>
    <p>三十年刑偵經驗，助您化解棘手難題</p>
    <div class="card">
        <input type="text" id="name" placeholder="您的稱呼">
        <select id="category">
            <option value="刑事諮詢">刑事諮詢</option>
            <option value="民事糾紛">民事糾紛</option>
            <option value="權益維護">權益維護</option>
            <option value="其他難題">其他難題</option>
        </select>
        <textarea id="desc" rows="5" placeholder="請詳述問題..."></textarea>
        <input type="text" id="contactId" placeholder="聯絡方式 (Telegram)">
        <button onclick="submitCase()">立即提交問題</button>
    </div>

    <script>
        async function submitCase() {
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbyUUc9CbeSBOiAdWl1XtRoSg85sCTMshfCV2lUgTZnzl9txAZcPcwNDIXsCptXcXFOVvw/exec'; 
            const payload = {
                appId: 'CASE-' + Math.floor(Math.random()*10000),
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                description: document.getElementById('desc').value,
                contactId: document.getElementById('contactId').value
            };

            alert('正在提交，請稍候...');
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('提交成功！我們將盡快回覆您。');
            location.reload();
        }
    </script>
</body>
</html>
